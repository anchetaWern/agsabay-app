<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Driver Location Click Simulator</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f0eb; color: #1a1a1a; }
    #app { display: flex; flex-direction: column; height: 100vh; }
    #toolbar {
      display: flex; gap: 10px; align-items: center;
      padding: 10px 14px; background: #fff; border-bottom: 1px solid #e0dfd8; flex-wrap: wrap;
    }
    #toolbar h1 { font-size: 15px; font-weight: 600; margin-right: 8px; color: #1a1a1a; }
    .pill { background: #f5f4f0; border: 1px solid #e0dfd8; border-radius: 999px; padding: 6px 10px; font-size: 12px; }
    .btn {
      padding: 7px 12px; font-size: 12px; border-radius: 8px;
      border: 1px solid #d0cfc8; background: #fff; color: #333; cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover { background: #f5f4f0; }
    #main { display: flex; flex: 1; overflow: hidden; }
    #map { flex: 1; height: 100%; }
    #sidebar {
      width: 320px; background: #fff; border-left: 1px solid #e0dfd8;
      display: flex; flex-direction: column; overflow: hidden;
    }
    #status {
      padding: 12px 14px; border-bottom: 1px solid #e0dfd8; font-size: 12px; line-height: 1.8;
      background: #fafaf8;
    }
    #status strong { color: #1a1a1a; }
    .coord { font-family: 'Courier New', monospace; font-size: 11px; color: #444; background: #f0f0eb; padding: 1px 5px; border-radius: 4px; }
    #log {
      flex: 1; overflow-y: auto; padding: 10px 12px; font-size: 12px; color: #444;
    }
    .log-entry {
      border: 1px solid #e0dfd8; background: #fafaf8; border-radius: 8px;
      padding: 8px 10px; margin-bottom: 6px;
    }
    .log-entry.ok { border-color: #16a34a; background: #f0fdf4; }
    .log-entry.err { border-color: #e74c3c; background: #fdf2f2; }
    .log-entry .meta { color: #666; font-size: 11px; margin-top: 4px; }
  </style>
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <h1>🛺 Driver Location Click Simulator</h1>
      <span class="pill">Driver ID: <strong>1</strong></span>
      <span class="pill">Endpoint: <strong>/api/drivers/1/location</strong></span>
      <button class="btn" id="bClear">Clear log</button>
      <span class="pill" id="hint">Click anywhere on the map to move the driver</span>
    </div>
    <div id="main">
      <div id="map"></div>
      <div id="sidebar">
        <div id="status">
          State: <strong id="state">Not placed</strong><br>
          Lat: <span class="coord" id="dLat">—</span><br>
          Lng: <span class="coord" id="dLng">—</span><br>
          Last POST: <strong id="lastPost">—</strong>
        </div>
        <div id="log">
          <div class="log-entry">Waiting for map clicks…</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const DRIVER_ID = 1;
    const API_KEY = 'juan20';
    const ENDPOINT = 'https://agsabay-server.test/api/drivers/1/location';

    const map = L.map('map').setView([16.6151032, 120.3140831], 23);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors', maxZoom: 19
    }).addTo(map);

    const driverIcon = L.divIcon({
      className: '',
      html: `<div style="width:32px;height:32px;background:#1a56db;border:3px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,0.3)">D</div>`,
      iconSize: [32, 32], iconAnchor: [16, 16]
    });

    let driverMarker = null;

    function setStatus(latlng) {
      if (!latlng) {
        document.getElementById('state').textContent = 'Not placed';
        document.getElementById('dLat').textContent = '—';
        document.getElementById('dLng').textContent = '—';
        return;
      }
      document.getElementById('state').textContent = 'Placed';
      document.getElementById('dLat').textContent = latlng.lat.toFixed(6);
      document.getElementById('dLng').textContent = latlng.lng.toFixed(6);
    }

    function addLogEntry({ ok, lat, lng, status, message }) {
      const log = document.getElementById('log');
      const div = document.createElement('div');
      div.className = `log-entry ${ok ? 'ok' : 'err'}`;
      div.innerHTML = `
        <div><strong>${ok ? 'POST OK' : 'POST FAILED'}</strong></div>
        <div>Lat: <span class="coord">${lat.toFixed(6)}</span> Lng: <span class="coord">${lng.toFixed(6)}</span></div>
        <div class="meta">HTTP ${status}${message ? ' • ' + message : ''}</div>
      `;
      log.prepend(div);
    }

    async function postLocation(lat, lng) {
      const started = new Date();
      try {
        const res = await fetch(ENDPOINT, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Api-Key': API_KEY
          },
          body: JSON.stringify({ lat, lng })
        });
        document.getElementById('lastPost').textContent = started.toLocaleTimeString();
        const text = await res.text();
        addLogEntry({
          ok: res.ok,
          lat, lng,
          status: res.status,
          message: text ? text.slice(0, 120) : ''
        });
      } catch (err) {
        document.getElementById('lastPost').textContent = started.toLocaleTimeString();
        addLogEntry({
          ok: false,
          lat, lng,
          status: 0,
          message: err && err.message ? err.message : 'Network error'
        });
      }
    }

    map.on('click', e => {
      if (driverMarker) driverMarker.setLatLng(e.latlng);
      else driverMarker = L.marker(e.latlng, { icon: driverIcon, zIndexOffset: 2000 }).addTo(map);
      setStatus(e.latlng);
      postLocation(e.latlng.lat, e.latlng.lng);
    });

    document.getElementById('bClear').onclick = () => {
      document.getElementById('log').innerHTML = '<div class="log-entry">Log cleared.</div>';
    };

    setStatus(null);
  </script>
</body>
</html>
